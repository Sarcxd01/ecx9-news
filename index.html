<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECX-9 Official</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: "Courier New", monospace;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            border: 2px solid #fff;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 5px;
        }
        .header h1 {
            font-size: 28px;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }
        .header .subtitle {
            font-size: 14px;
            letter-spacing: 2px;
        }

        /* Platform Bar */
        .platform-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            margin-bottom: 5px;
            border-bottom: 2px solid #fff;
        }
        .platform-icon {
            width: 35px;
            height: 35px;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .platform-label {
            font-size: 14px;
            letter-spacing: 2px;
            margin-left: auto;
        }

        /* Date Bar */
        .date-bar {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #fff;
            margin-bottom: 15px;
        }
        .date-line {
            flex: 1;
            height: 8px;
            background-color: #fff;
            margin-right: 15px;
        }
        .date-text {
            font-size: 12px;
            color: #888;
        }

        /* News Items */
        .news-item {
            padding: 12px 0;
            border-bottom: 1px solid #fff;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .news-item:last-child {
            border-bottom: none;
        }
        .news-title-bar {
            height: 10px;
            background-color: #fff;
            margin-bottom: 8px;
            width: 60%;
        }
        .news-meta-bar {
            height: 6px;
            background-color: #fff;
            margin-bottom: 5px;
            width: 40%;
        }
        .news-content {
            display: none;
            margin-top: 10px;
            font-size: 11px;
            line-height: 1.6;
            color: #ccc;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
        .news-item.active .news-content {
            display: block;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px 0;
            font-size: 12px;
            color: #888;
            border-top: 2px solid #fff;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>ECX-9</h1>
            <div class="subtitle">Official</div>
            <div class="subtitle" style="margin-top: 10px;">news - Update</div>
        </div>

        <!-- Platform Bar -->
        <div class="platform-bar">
            <div class="platform-icon">▶</div>
            <div class="platform-icon">⊞</div>
            <div class="platform-icon">⚡</div>
            <div class="platform-icon">♦</div>
            <div class="platform-icon">@</div>
            <div class="platform-icon">⚙</div>
            <span class="platform-label">PLATforme</span>
        </div>

        <!-- Date Bar -->
        <div class="date-bar">
            <div class="date-line"></div>
            <span class="date-text">2026-06-22</span>
        </div>

        <!-- News Items -->
        <div id="news-container">
            <div class="news-item">
                <div class="news-title-bar"></div>
                <div class="news-meta-bar"></div>
            </div>
            <div class="news-item">
                <div class="news-title-bar" style="width: 80%;"></div>
                <div class="news-meta-bar" style="width: 50%;"></div>
            </div>
            <div class="news-item">
                <div class="news-title-bar" style="width: 70%;"></div>
                <div class="news-meta-bar" style="width: 45%;"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            ECX-9 © 2026
        </div>
    </div>

    <script>
        fetch('api.json')
            .then(response => response.json())
            .then(data => {
                document.querySelector('.date-text').textContent = data.last_updated;
                
                const container = document.getElementById('news-container');
                container.innerHTML = '';
                
                data.news.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.innerHTML = `
                        <div class="news-title-bar" style="width: ${40 + Math.random() * 40}%;"></div>
                        <div class="news-meta-bar" style="width: ${30 + Math.random() * 20}%;"></div>
                        <div class="news-content">
                            <strong>${item.title}</strong><br><br>
                            ${item.content}<br><br>
                            <span style="color: #666;">${item.author} - ${item.date}</span>
                        </div>
                    `;
                    div.addEventListener('click', () => {
                        div.classList.toggle('active');
                    });
                    container.appendChild(div);
                });
            })
            .catch(error => {
                console.log('Using static layout');
            });
    </script>
</body>
</html>
