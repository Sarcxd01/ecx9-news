<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECX-9 Official</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: "Courier New", monospace;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            border: 3px solid #fff;
            padding: 20px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            font-size: 12px;
        }
        .news-item {
            border: 2px solid #fff;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .news-item:hover {
            background-color: #fff;
            color: #000;
        }
        .news-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .news-meta {
            font-size: 10px;
            color: #888;
        }
        .news-content {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #444;
            font-size: 12px;
            line-height: 1.6;
        }
        .news-item.active .news-content {
            display: block;
        }
        .news-item.active {
            background-color: #222;
        }
        .category {
            color: #0ff;
            font-size: 10px;
        }
        .author {
            color: #888;
            font-size: 10px;
        }
        footer {
            border-top: 2px solid #fff;
            padding-top: 10px;
            margin-top: 20px;
            font-size: 10px;
            color: #888;
            text-align: center;
        }
        .api-link {
            color: #0ff;
            text-decoration: none;
        }
        .api-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ECX-9 Official</h1>
            <div class="subtitle">win.me - News & Updates</div>
        </header>
        
        <div id="news-container">
            <p>Loading news...</p>
        </div>
        
        <footer>
            <p>ECX-9 &copy; 2026 | <a href="api.json" class="api-link">API (JSON)</a></p>
        </footer>
    </div>

    <script>
        fetch('api.json')
            .then(response => response.json())
            .then(data => {
                document.querySelector('.subtitle').textContent = 
                    'win.me - News & Updates | Last updated: ' + data.last_updated;
                
                const container = document.getElementById('news-container');
                container.innerHTML = '';
                
                data.news.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.innerHTML = `
                        <div class="news-title">${item.title}</div>
                        <div class="news-meta">
                            <span class="category">[${item.category}]</span>
                            <span class="author">${item.author}</span>
                            - ${item.date}
                        </div>
                        <div class="news-content">${item.content}</div>
                    `;
                    div.addEventListener('click', () => {
                        div.classList.toggle('active');
                    });
                    container.appendChild(div);
                });
            })
            .catch(error => {
                document.getElementById('news-container').innerHTML = 
                    '<p>Error loading news. Please try again later.</p>';
            });
    </script>
</body>
</html>
